<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0d1f33"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#0077b6"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="256" height="256" rx="40" fill="url(#bg)"/>
  <!-- Left panel -->
  <rect x="20" y="36" width="100" height="184" rx="8" fill="url(#panel)" opacity="0.9"/>
  <!-- Right panel -->
  <rect x="136" y="36" width="100" height="184" rx="8" fill="url(#panel)" opacity="0.7"/>
  <!-- Subtle file entries on panels (below letters) -->
  <rect x="32" y="162" width="76" height="5" rx="2" fill="#ffffff" opacity="0.3"/>
  <rect x="32" y="174" width="60" height="5" rx="2" fill="#ffffff" opacity="0.25"/>
